name: Build 3D Models

env:
  PREVIEW_IMGSIZE: '640,480'

on:
  push:
    branches:
      - main
    paths:
      - 'projects/**'
      - 'libs/**'
      - 'scripts/**'
  pull_request:
    branches:
      - main
    paths:
      - 'projects/**'
      - 'libs/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      project:
        description: 'Project name to build (leave empty to build all)'
        required: false
        default: ''

jobs:
  # ── Detect which projects need rebuilding ──────────────────────────────────
  detect-changes:
    name: Detect changed projects
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      any_changed: ${{ steps.detect.outputs.any_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed projects
        id: detect
        run: |
          # Collect all available projects (those with a main.scad)
          all_projects=()
          for dir in projects/*/; do
            [ -f "${dir}main.scad" ] && all_projects+=("$(basename "$dir")")
          done

          project_input="${INPUT_PROJECT:-}"

          if [ -n "$project_input" ]; then
            # Manual dispatch: build only the requested project (if it exists)
            found=false
            for p in "${all_projects[@]:-}"; do
              [ "$p" = "$project_input" ] && found=true && break
            done
            if $found; then
              projects_json="[\"$project_input\"]"
              any_changed="true"
            else
              echo "WARNING: Project '$project_input' not found."
              projects_json='[]'
              any_changed="false"
            fi
          else
            # Determine changed files between HEAD and its parent
            changed=$(git diff --name-only HEAD^ HEAD 2>/dev/null || git diff-tree --no-commit-id --name-only -r HEAD 2>/dev/null)

            # Changes in libs/ or scripts/ → rebuild ALL projects
            if echo "$changed" | grep -qE '^(libs|scripts)/'; then
              if [ ${#all_projects[@]} -gt 0 ]; then
                printf -v projects_json '"%s",' "${all_projects[@]:-}"
                projects_json="[${projects_json%,}]"
                any_changed="true"
              else
                projects_json='[]'
                any_changed="false"
              fi
            else
              # Collect only the projects whose files changed
              declare -A changed_set
              while IFS= read -r file; do
                if [[ "$file" == projects/* ]]; then
                  proj=$(echo "$file" | cut -d/ -f2)
                  changed_set["$proj"]=1
                fi
              done <<< "$changed"

              selected=()
              for p in "${all_projects[@]:-}"; do
                [ "${changed_set[$p]+_}" ] && selected+=("$p")
              done

              if [ ${#selected[@]} -gt 0 ]; then
                printf -v projects_json '"%s",' "${selected[@]}"
                projects_json="[${projects_json%,}]"
                any_changed="true"
              else
                projects_json='[]'
                any_changed="false"
              fi
            fi
          fi

          echo "projects=${projects_json}" >> "$GITHUB_OUTPUT"
          echo "any_changed=${any_changed}" >> "$GITHUB_OUTPUT"
          echo "Projects to build: ${projects_json}"
        env:
          INPUT_PROJECT: ${{ github.event.inputs.project }}

  # ── Build each project ─────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.project }}
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OpenSCAD
        run: sudo apt-get update && sudo apt-get install -y openscad xvfb

      - name: Bundle project – ${{ matrix.project }}
        env:
          PROJECT: ${{ matrix.project }}
        run: |
          python scripts/bundle.py \
            "projects/$PROJECT/main.scad" \
            --repo-root . \
            --tree-shake \
            -o "dist/$PROJECT.scad"

      - name: Render preview image – ${{ matrix.project }}
        id: render
        continue-on-error: true
        env:
          PROJECT: ${{ matrix.project }}
        run: |
          xvfb-run -a openscad \
            -o "dist/$PROJECT.png" \
            --imgsize="${PREVIEW_IMGSIZE}" \
            "projects/$PROJECT/main.scad"

      - name: Upload bundled scad artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}
          path: dist/${{ matrix.project }}.scad
          if-no-files-found: error

      - name: Upload preview image
        if: steps.render.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: preview-${{ matrix.project }}
          path: dist/${{ matrix.project }}.png
          if-no-files-found: warn

  # ── Collect preview images ─────────────────────────────────────────────────
  collect-previews:
    name: Collect preview images
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Download preview artifacts
        id: download
        uses: actions/download-artifact@v4
        with:
          pattern: preview-*
          path: preview-downloads
          merge-multiple: true
        continue-on-error: true

      - name: Flatten preview images
        if: steps.download.outcome == 'success'
        run: |
          mkdir -p preview-images
          if [ -d preview-downloads ]; then
            find preview-downloads -name '*.png' -exec cp {} preview-images/ \;
          fi
          echo "Collected preview images:"
          ls preview-images/ 2>/dev/null || echo "(none)"

      - name: Ensure preview-images directory exists
        run: mkdir -p preview-images

      - name: Upload combined preview-images artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-images
          path: preview-images/
          if-no-files-found: warn
          retention-days: 90

  # ── Summary ────────────────────────────────────────────────────────────────
  summary:
    name: Build summary
    needs: [detect-changes, build]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Report result
        env:
          PROJECTS: ${{ needs.detect-changes.outputs.projects }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          echo "### 3D Model Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Built projects: \`${PROJECTS}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$BUILD_RESULT" == "success" ]]; then
            echo "✅ All projects built successfully." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$BUILD_RESULT" == "skipped" ]]; then
            echo "⏭️ No projects needed rebuilding." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ One or more projects failed to build." >> "$GITHUB_STEP_SUMMARY"
          fi
