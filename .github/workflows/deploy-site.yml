name: Deploy Catalog Site

on:
  workflow_run:
    workflows: ["Build 3D Models"]
    types: [completed]
    branches: [main]
  push:
    branches:
      - main
    paths:
      # Only paths that do NOT trigger the Build workflow.
      # Model / script / project.json changes trigger Build → workflow_run → here.
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build catalog site
    # Skip when triggered by a failed build workflow run.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _site/images _site/downloads

          # Collect all project directory names
          projects=()
          for dir in projects/*/; do
            [ -f "${dir}main.scad" ] && projects+=("$(basename "$dir")")
          done

          echo "Projects to fetch artifacts for: ${projects[*]}"

          # For each project, download the latest scad and preview artifacts
          # from any successful build run (not just the most recent one).
          for proj in "${projects[@]}"; do
            echo "--- Fetching artifacts for: $proj ---"

            # Download latest bundled scad artifact (skip expired)
            scad_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=${proj}&per_page=5" \
              --jq '[.artifacts[] | select(.expired == false)][0].id // empty' 2>/dev/null || true)
            if [ -n "$scad_id" ]; then
              echo "  Downloading scad artifact (ID: $scad_id)..."
              gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${scad_id}/zip" \
                > "/tmp/${proj}.zip" 2>/dev/null
              unzip -o "/tmp/${proj}.zip" -d "_site/downloads/" 2>/dev/null \
                || echo "  WARNING: Failed to unzip scad artifact for $proj"
              rm -f "/tmp/${proj}.zip"
            else
              echo "  WARNING: No scad artifact found for $proj"
            fi

            # Download latest preview image artifact (skip expired)
            preview_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=preview-${proj}&per_page=5" \
              --jq '[.artifacts[] | select(.expired == false)][0].id // empty' 2>/dev/null || true)
            if [ -n "$preview_id" ]; then
              echo "  Downloading preview artifact (ID: $preview_id)..."
              gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${preview_id}/zip" \
                > "/tmp/preview-${proj}.zip" 2>/dev/null
              unzip -o "/tmp/preview-${proj}.zip" -d "_site/images/" 2>/dev/null \
                || echo "  WARNING: Failed to unzip preview artifact for $proj"
              rm -f "/tmp/preview-${proj}.zip"
              # Also copy preview to downloads
              if [ -f "_site/images/${proj}.png" ]; then
                cp "_site/images/${proj}.png" "_site/downloads/"
              fi
            else
              echo "  WARNING: No preview artifact found for $proj"
            fi
          done

          echo "Preview images collected:"
          ls _site/images/ 2>/dev/null || echo "(none)"
          echo "Downloads prepared:"
          ls _site/downloads/ 2>/dev/null || echo "(none)"

      - name: Build site
        run: python scripts/generate_catalog.py --output-dir _site --repo-root . --images-dir _site/images --downloads-dir _site/downloads

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
