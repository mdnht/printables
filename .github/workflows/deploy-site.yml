name: Deploy Catalog Site

on:
  workflow_run:
    workflows: ["Build 3D Models"]
    types: [completed]
    branches: [main]
  push:
    branches:
      - main
    paths:
      # Only paths that do NOT trigger the Build workflow.
      # Model / script / project.json changes trigger Build → workflow_run → here.
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build catalog site
    # Skip when triggered by a failed build workflow run.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _site/images _site/downloads
          RUN_ID=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow build.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            echo "Downloading artifacts from build run $RUN_ID..."
            gh run download "$RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              -D _dl || echo "WARNING: Failed to download artifacts"
            # Copy preview images
            if [ -d "_dl/preview-images" ]; then
              cp _dl/preview-images/*.png _site/images/ 2>/dev/null || true
            fi
            # Copy bundled scad files and preview images to downloads
            for dir in _dl/*/; do
              name=$(basename "$dir")
              # Skip preview-only artifacts
              case "$name" in preview-*) continue;; esac
              # Copy scad files
              find "$dir" -name '*.scad' -exec cp {} _site/downloads/ \;
              # Copy corresponding preview image for download
              if [ -f "_site/images/${name}.png" ]; then
                cp "_site/images/${name}.png" "_site/downloads/"
              fi
            done
            echo "Downloads prepared:"
            ls _site/downloads/ 2>/dev/null || echo "(none)"
          else
            echo "WARNING: No successful build run found – building without artifacts"
          fi

      - name: Build site
        run: python scripts/generate_catalog.py --output-dir _site --repo-root . --images-dir _site/images --downloads-dir _site/downloads

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
