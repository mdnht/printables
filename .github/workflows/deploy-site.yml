name: Deploy Catalog Site

on:
  workflow_run:
    workflows: ["Build 3D Models"]
    types: [completed]
    branches: [main]
  push:
    branches:
      - main
    paths:
      # Only paths that do NOT trigger the Build workflow.
      # Model / script / project.json changes trigger Build → workflow_run → here.
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build catalog site
    # Skip when triggered by a failed build workflow run.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./site
        run: npm install

      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p site/public/images site/public/downloads

          # Get the current GitHub Pages URL for fallback when artifacts expire.
          PAGES_URL=$(gh api "repos/${GITHUB_REPOSITORY}/pages" \
            --jq '.html_url // empty' 2>/dev/null || true)
          # Ensure URL ends with /
          if [ -n "$PAGES_URL" ] && [[ "$PAGES_URL" != */ ]]; then
            PAGES_URL="${PAGES_URL}/"
          fi
          echo "GitHub Pages URL for fallback: ${PAGES_URL:-not available}"

          # Collect all project directory names
          projects=()
          for dir in projects/*/; do
            [ -f "${dir}main.scad" ] && projects+=("$(basename "$dir")")
          done

          echo "Projects to fetch artifacts for: ${projects[*]}"

          # For each project, download the latest scad and preview artifacts
          # from any successful build run (not just the most recent one).
          # When artifacts have expired, fall back to the deployed Pages site.
          for proj in "${projects[@]}"; do
            echo "--- Fetching artifacts for: $proj ---"
            got_scad=false
            got_preview=false

            # ── scad artifact ──
            scad_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=${proj}&per_page=5" \
              --jq '[.artifacts[] | select(.expired == false)][0].id // empty' 2>/dev/null || true)
            if [ -n "$scad_id" ]; then
              echo "  Downloading scad artifact (ID: $scad_id)..."
              if gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${scad_id}/zip" \
                   > "/tmp/${proj}.zip" 2>/dev/null \
                 && unzip -oj "/tmp/${proj}.zip" "*${proj}.scad" -d "site/public/downloads/" 2>/dev/null \
                 && [ -f "site/public/downloads/${proj}.scad" ]; then
                got_scad=true
              fi
              rm -f "/tmp/${proj}.zip"
            fi

            # ── preview image artifact ──
            preview_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=preview-${proj}&per_page=5" \
              --jq '[.artifacts[] | select(.expired == false)][0].id // empty' 2>/dev/null || true)
            if [ -n "$preview_id" ]; then
              echo "  Downloading preview artifact (ID: $preview_id)..."
              if gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${preview_id}/zip" \
                   > "/tmp/preview-${proj}.zip" 2>/dev/null \
                 && unzip -oj "/tmp/preview-${proj}.zip" "*${proj}.png" -d "site/public/images/" 2>/dev/null \
                 && [ -f "site/public/images/${proj}.png" ]; then
                got_preview=true
              fi
              rm -f "/tmp/preview-${proj}.zip"
            fi

            # ── Fallback: fetch from deployed GitHub Pages site ──
            if (! $got_scad || ! $got_preview) && [ -n "$PAGES_URL" ]; then
              echo "  Falling back to deployed site for missing files..."
              if ! $got_scad; then
                if curl -fsSL "${PAGES_URL}downloads/${proj}.zip" \
                     -o "/tmp/fallback-${proj}.zip" 2>/dev/null; then
                  unzip -o "/tmp/fallback-${proj}.zip" -d "site/public/downloads/" 2>/dev/null \
                    && { got_scad=true; echo "  Recovered scad from deployed site"; }
                  rm -f "/tmp/fallback-${proj}.zip"
                fi
              fi
              if ! $got_preview; then
                if curl -fsSL "${PAGES_URL}images/${proj}.png" \
                     -o "site/public/images/${proj}.png" 2>/dev/null; then
                  got_preview=true
                  echo "  Recovered preview from deployed site"
                fi
              fi
              # If preview is still missing but was extracted from the deployed zip,
              # copy it from downloads to images.
              if ! $got_preview && [ -f "site/public/downloads/${proj}.png" ]; then
                cp "site/public/downloads/${proj}.png" "site/public/images/"
                got_preview=true
                echo "  Recovered preview from deployed zip"
              fi
            fi

            $got_scad    || echo "  WARNING: No scad available for $proj"
            $got_preview || echo "  WARNING: No preview available for $proj"

            # Copy preview to downloads for zip creation
            if [ -f "site/public/images/${proj}.png" ]; then
              cp "site/public/images/${proj}.png" "site/public/downloads/"
            fi

            # Create zip package for project containing scad and png files
            cd site/public/downloads
            if ls *${proj}.* 1> /dev/null 2>&1; then
              zip -q ${proj}.zip *${proj}.* || true
            fi
            cd ../../..
          done

          echo "Preview images collected:"
          ls site/public/images/ 2>/dev/null || echo "(none)"
          echo "Downloads prepared:"
          ls site/public/downloads/ 2>/dev/null || echo "(none)"

      - name: Build site
        working-directory: ./site
        run: npm run generate

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/.output/public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
